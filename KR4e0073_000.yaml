body:
  text: 練中丞集别集類五明提要臣等謹案練中丞集二卷明練子寧撰子寧名安以字行號松月居士新淦人洪武乙丑進士建文時官左副都御史燕兵入殉節死事迹具明史本傳當燕王篡立之初誣建文諸臣為姦黨禁其文字甚嚴宏治中王佐始輯其遺文名曰金川玉屑故徐泰詩説有金川練子寧玉屑無多為世所寶之語此本乃泰和郭子章重編附以遺事一卷其裔孫綺復增輯之黃溥簡籍遺聞嘗記集中可疑者三事一曰送花狀元歸娶詩謂洪武辛亥至建文庚辰狀元但有吳伯宗丁顯任亨泰許觀張信陳䢿胡靖七人無所謂狀元花綸綸乃洪武十七年浙江鄉試第二不應有奉詔歸娶事一曰故耆老理庭黃公墓志謂子寧及第在洪武十八年此志後題洪武丙辰三月之吉乃洪武九年不應結銜稱賜進士及第授翰林院修撰一曰集後雜考引葉盛水東曰記載長樂鄭氏有手卷練子寧賦張顯宗跋稱顯宗狀元及第洪武時亦無此狀元其言頗核蓋子寧一代偉人人爭依託因而影撰者有之然終不以偽廢其真也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總官臣陸費墀
  hash: sha256:3c7e4f6321c1cab88b8db3710e58a838a83ae32d3d5a241c063aae44df7eba18
