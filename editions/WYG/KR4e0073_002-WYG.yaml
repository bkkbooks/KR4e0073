body:
  text: 中丞集卷下明練子寧撰書跋與葉知縣書正月二十一日子寧謹奉書大尹執事僕罪惡深重天降之酷主上矜其烏鳥之情慨然俾歸田里以盡夫送終之制扁舟南上哀戚日深自以身為天子侍從之臣今又斬然在衰絰之中義不得與百司私接用是杜門自守於執事之來心竊為吾邑人喜之而未敢一日接執事之論也雖然君子之於事也非所當言而言之謂之僭於所當言而不言之謂之吝僭與吝皆非君子之所為也今既有當言之義於執事矣豈敢拘牽常制而終黙黙而已耶執事以天子之命出宰玆土一邑之治否執事榮辱係焉執事其可謂職止於簿書期㑹之間而昧於消禍救寃之逺慮耶諺曰盗賊起於饑寒禮義生於富足夫惟君子而後能不動心於饑寒茍非其人則無所不至矣曩者草昧之初聖人未出梟頑之徒假燒香誦佛之名以嘯召無賴而無知之民亦紛然而從之蓋其初也惑於妖恠之說而冀免於禍災而其終也卒剽掠攻刼而為盜賊之計故有國之興必草薙而禽獮之而郡守縣令尤嚴於日夜督察以去夫生民之大害比聞鄉落盛於彌勒之說而私奉其名號者間有之矣此豈非賢守令之責歟僕不幸居於兹土而又食天子之禄以為王臣其可忽於未然之禍而不相告耶雖然言之者僕之責也聴而行之者執事之責也今為執事之計者無他焉亦曰明朝廷之禁以徧喻夫鄉邑之民使之曉然知禍福之所在然後嚴其各鄉之里老使之更相檢察以去姦邪之輩敢有容匿者以其罪罪之而命巡檢諸司各於所𨽻亷捕茍得其實許諸色人得以風聞其有邀受財賄私相縱釋及懐挾私讐誣執平民者皆坐以罪擇其􅇯惡之尤者一二人置諸法以明示之則奸猾破膽而自散矣語曰滔天之浸始於涓涓燎原之烈延於細微杜漸之不可不早也今竊聴於鄉邑之間其勢亦可謂滔滔而燄燄矣執事其亦少加意焉夫移風易俗使斯民隂受其福非俗吏之所能而賢良之吏所以見稱於史籍也執事起身文儒其必素以古人自期矣奚待於僕之喋喋哉僕於執事有不當私見之禮而有當公言之義故不敢㠯哀迷之故而忘一邑之大憂至於條目之委曲則尤賢哲令之所當盡心非尺牘之所能具陳也惟執事察之書松風江月圖世之處喧雜者未有不寓意於恬曠以為髙以余觀之是特慕其名耳非真樂夫恬曠者也懐千金之璧無矜衒之色千金之璧固吾所有何待於外哉故不踐其實而茍取其名皆非真有所得者也若夫方外之士則不然脫屣勢利之塗翛然塵埃之外其於山林之樂宜若無羡者矣今吾東舟上人乃以松風江月扁其所居之室而且繪為圖以見諸詠歌亦肻有所待於外哉雖然士茍無累於世凢物皆有所樂者東舟果能如水鏡以一攝萬則松風江月何徃而不足寓其適也區區塵俗之餘披卷三復悵然久之書醉遊圖右楊貴妃醉遊圖鄉先生劉仲脩題以為周文矩真蹟新淦鄧氏世寶蓄之間以示余求著其語世之可畫者衆矣而於𤣥宗遺蹟畫者尤善於其形容豈其有意於垂戒而致然歟抑其荒淫之風有以入人之深而將以為遊玩之具也雖然古語有之賢賢易色使𤣥宗移是心而施於韓休張九齡諸賢則開元之丕績庶其有終而安史之徒日累千百亦何患哉不此之圖而宴遊之是務固末如之何也已矣然文矩之畫精神意度溢於目中豈世俗所可彷彿耶書彭聲之先生所題杏林書屋圖余友李用升以其先人所藏杏林書屋圖并詩訪余求識其後余觀書屋之畫自足名世而又侈之以匏菴先生之詞翰豈非古人所謂三絶者耶用升以先人之故而欲装潢之以傳永久可謂能世其家聲也用書卷端以識嵗月云跋山隂遺墨仲脩先生詞翰之美獨歩江右先生初不自貴重有求者輙予之世俗亦不知其可寳先生沒後數年而擅新美者殆不多見矣故片楮寸墨士大夫莫不秘襲之以為久逺之玩焉嗚呼文章翰墨自有定價固有忽乎近而貴乎逺者矣矧先生之節行有足以髙世者耶然則區區字畫之工蓋其淺者爾邑庠錢伯淳氏得先生所書蘇文忠雜説二而無題識懼嵗月之久而或冺其自也謁余識之余因慨慕先生之風而恨其不可作者遂不辭而書其後亦以見先生之可貴者此特其萬一爾跋笑隠遺墨笑隠禪師文章節行卓立方外余家有所贈張清夫詩一幅筆力詞氣甚有蘇文忠公遺風兵後流落田家余一日偶見之則已為老嫗履樣之用矣亟命完之僅失一二字遂以錢易之以歸因思文與可所謂襪材豈獨絹素哉西山即休上人少遊江湖嘗見知於師者也聞余所藏而悦之因以遺焉跋饒自然畫玉川之清致昌黎韓公已見諸詠歌矣冝後人景慕之至也吾淦饒自然深得馬逺筆法觀其作先生據床隠几之狀長鬚赤脚滌身附火之態情意可想真名筆也友人朱徳輝氏寶蓄之啜茗一觀亦何必與流俗對也跋水竹居詩序後洪武七年子寧始從竹庄先生游見先生為明徳作水竹居詩序且曰諸生試為賦之子寧詩有云千山暮雨石泉通一夜春雷籜龍長先生甚竒之曰此子後必有異於人因令書之卷尾後三年先生卒于邑庠而子寧以諸生入鄉校入成均當天子偃武脩文之秋以科舉取天下士而子寧荷父師之訓獲在第二於是方慨然有志於斯文以求不負朝廷奨擢之意而不幸以家艱歸孤窮困踣倐踰禫服明徳手是卷重徴序於予追憶徃事為之㱆欷感愴者累日非不能更作不敢僭齒先生之次也遂書之而併記此語於後以見子寧之不敢負先生之期望者不止於是而將有徴於他日也跋十二尊宿圖後為佛氏之學者曰戒生定定生慧余有取焉蓋人之一心譬之明鏡止水茍無塵埃之蝕泥滓之泊則事物之去留起伏逆來順徃旁見側出舉不能外吾照燭之内是是非非無所施而不可夫豈偶然之故哉亦必有以致之爾新淦百花智上人出十二尊宿問答圖示余求為著語余觀夫古之得道之士臨機應敵雖百千萬億問答不能窮其說茍無事焉一已多矣何必十二哉智上人弱冠棄家克意浮圖之學清苦堅忍雖同門之士莫不畏服焉是固深知所戒矣然則定與慧豈難致哉固不必於十二尊宿中强行他解也余非知佛氏之學者然其理則不外是智上人其以余言為然乎賦耽犂子賦閩粤之區有先號耽犂者耕於寛閒之野而老於熈皥之鄉以告松月居士曰吾拙於進取而惟犂鋤之是耽安於蹇窮而惟稼穡之是務方吾犂之在手也茫乎其無思熈乎其自怡不啻執圭秉璧之榮而運斤遊刃之適也夫是以取而自名子其為我賦之居士曰嘻子知所以得遂夫耽犂者乎天生蒸民紛然有欲强則凌弱衆則暴獨非聖神之首出孰克為之司牧藹徳禮於春生凜威刑於秋肅夫婦以别父子以屬彛倫是惇風俗返朴夫士得以遂其詩書商得以通其販鬻工得以措其巧於方圓農得以盡其力於重穆昔者堯舜在上皥皥熈熈康衢擊壤㓜恬老嬉湯武革命應天順人漸仁摩義頌聲以興洎戰國之爭雄遂下逮夫秦楚開阡陌而廢井田窮干戈而凟威武民生斯時何所控訴漢祖大度文景無為光武明章世紹丕基藹黎民之醇厚幾刑措於斯時魏晉以降南北分争壇坫迭主干戈日尋偉唐室之開基繇太宗之神武感魏徴之仁義歎封彛之莫覩曽未幾何藩鎮跋扈更厯五季民困常主及乎宋室之興削平僭亂開文明之景運幾跨唐而軼漢休養生息三百餘年彼番番之黄髪咸沒齒而無怨元氏之衰群雄奮起鹿逐鯨吞𤓰分鼎峙哀蒼生之紛藉轉溝壑而未已赫焉大明如日之升欃槍渙其氷釋魑魅匿而無形接統乎千嵗受命於穆清偃武脩文坐致太平出斯民之塗炭化愁怨為歡聲是以四海之内無一夫之不獲皆女織絍而男農耕向使世途方難真人未出於斯時也救死而恐不贍又何暇耽犂鉏而樂溝洫自今知之服膺勿失雖畊田而鑿井皆歌詠夫帝力貧窮相資患難相恤租必先公食必先粒耕必讓畔以同歸乎吾皇之極於是耽犂生仰而謝俯而揖請書諸紳服之無斁五言古詩題黄彦成雲林小隠有客素肥遯幽居愛林閭結屋依陋巷種樹繞城隅浮雲南山來清隂覆其閭老柳帶寒色芳蘭露春腴窻深不知曉樹宻室自虚甘貧意自適守道樂有餘娛賓非㫖酒飽食但園蔬流水赴大澤翔禽戀髙株物性各有遂誰能常晏如所㠯古人隠為時而卷舒商嶺豈高蹈渭陽非逺漁惟有巢由子千載烈丈夫山鳴谷尚應已獨不受呼嗟我眼中人孰不為利驅睠此雲林下蕭然塵鞅疏車馬塞里巷何能顧窮居寄語抱闗者當識其賢愚七言歌行駿馬歌君不見穆王八駿遊天路跡遍寰宇尚無度樂同王母宴瑶池賴得君牙挽周祚又不見明皇幸蜀八馬龍天寶不及開元中漁陽鼙皷烟塵黑玉環妖血鞍韉紅君看玉蹄三十二莫是天閑舊騏驥殘陽一片雨餘天芳草何年牧掃地雄姿逸態汗血新風鬃霧鬛騰踏勻一嘶一齧各有趣或行或止森同羣奚官控出塵飛動豈是造父王毛仲麒麟雖在地上行光價合為天下重摩挲猛氣猶騰驤出世即論周與唐吾皇不受千里獻黄金樂施涓人方駿兮駿兮渥洼種際㑹風雲擅才勇還君此畫歌我辭閶闔風生毛髪竦水竹居詩髙人結宇脩篁裏軒户玲瓏瞰流水庭臯月轉翠隂生溪上風回青浪起翠隂青浪映窻扉曲徑臺深客到稀林下移床揮麈坐沙頭繫艇釣魚歸柴門無事臨流敞髙卧支頥聴清響千山暮雨石泉通一夜春雷籜龍長几席清幽俗事踈波光盡日映圖書何年得遂辭塵埃杖策相從此卜居待月歌并引昨夜露坐東山停杯待月俄而桂香西來皓月東上清興灑然殊有塵外之想遂成短歌一章馳寄一二同志天風吹桂香夜久露華結清興誰與同停杯待明月明月須臾海上來青天一望無塵埃人看明月皎如昨月照人間知㡬迴人生何用嗟與歎月本無心尚圓缺玉兎搗藥能長生不管麻姑鬢如雪月既照我飲我且為月歌舉杯勸月月亦喜清樽厯亂揚金波願把紫鸞笙雙吹向􅋁廓直上蓬萊第一峰坐聴霓裳奏仙樂樵谷歌為雙峰饒子𢎞賦金川南上佳山水翠壁丹崖相對起玉山三十六芙蓉都入樵翁笑談裏藤蘿縛屋薜茘衣朝徃青崖曛暮歸松隂遺世時高枕谷口行歌日看棋昔年我作金門客素衣半化緇塵黑當時柱笏望西山始信漁樵不輕得今年奉勑又朝天手展詩囊索贈篇移文未許山靈誚伐木終期友道全丈夫出處須知命軒冕山林總天定他年我亦謝官歸遲爾長鑱緑蘿逕三月望日與饒隠君子宏遊玉笥山謠我懐謝康樂獨徃遊名山身同虚舟繫心與浮雲閑清風淡蕩洒六合令我興在雲松間玉山髙與南斗齊雲錦照耀廬山低三十六峰凌虹霓飛湍噴雪臨迴溪長松掛月青猿啼上有梅仙採藥之幽栖下有蕭雲讀書之故基洞天石扇杳莫測瑤草謾長三春荑我欲因之覽八荒手拂青蘿眠石床回飈吹散碧天霧清㝠倒㵼澄湖光作為玉山謠寄之雙峰客興來攜妓秋復春笑殺東山謝安石贈人憶昔先人辭玉京君家父子來相迎開軒岸幘耽松雪酒酣落筆滄溟驚周南留滯有遺命剪薄濫欲追羣英明當盡節報天子從此雲間吹玉笙玉山謠贈時憲我所思兮玉山之岧嶤􅙾夫容兮凌青霄謫仙一去已千載至今誰續廬山謠熊侯家住劍江側慣掃秋山之黛色聞余此興為寫之彷彿梅仙舊時宅梅仙兮何在邈清風兮滄海蹇夷猶兮孤舟弔遺跡於千載舟中所載非凢流羌故人兮李與周按玉笙兮明月下黄鵠兮清秋洞天兮石扇蒼崖兮路轉横余劔兮視八荒訪蓬萊兮㡬清淺張侯兮昂藏驂白鶴兮青霓裳窺玉梁之寳笈醉石髓之瓊漿千岩萬轉路莫測酒酣一笑三山窄待得君王賜鑑湖錦袍重訪山中客五言律詩輞川釣者圖家住黄溪上金川似輞川凉風垂釣坐明月棹歌還緑水雕胡飯金鱗縮項鯿鑑湖如可乞相與誦堯天與謝伯大㑹宿石溪寺次日贈竹隠上人髙僧號竹隠開寺大江邊如意懸書室袈裟上釣船樓臺開世界龍象接人天記得連床處松風夜不眠贈魯生師徳東遊羡子多才藝臨風感慨深琴彈别鶴操聲作老龍吟落落平生志悠悠太古心東遊萬里道到處遇知音贈郡庠張允真作蘭卷楚楚張公子山林興甚長行舲思澧浦隨筆寫沅湘劍㦸青雲濕衣裳夕露凉伯英書法在奕葉繼遺芳戲簡文儀歸郊居督工刈稻丹桂映秋風江村九月中思歸縁穫稻憂國願為農霜薄蒹葭渚秋髙鴻鴈風齊眉如有饋應不愧梁鴻周子林讀書樓藏書貽矩誨僻地起高樓月露連書蓄星河拂户流蘭膏長照夜竹簟正宜秋窻逈伊吾逺簷髙緯絡愁分隂思積學暇日坐消憂芸閣歸來日相期共校讐七言律詩廷試作天子臨軒䇿治安近臣如雨侍金鑾百年禮樂成周典一代威儀陋漢官文氣夜連奎壁動龍光晴射斗牛寒董生莫負天人䇿學術須期百世看早朝二首銀燭光中烏夜啼棘闈清徹候晨雞西窻聴雨叅同赴上苑看花憶舊題王氣曉瞻雙闕上文星夜貫五雲西明朝珂珮朝天去金殿春風玉筍齊紫陌行來曙色微姓名催喚入金闈静鞭響徹鴛班肅贊禮聲髙虎拜齊珂珮共聆天上語文章特赴御前題朝回日晏長安道風送飛花襯馬蹄元旦扶桑枝上曉雲紅玉厯頒春斗柄東龍虎風雲千載㑹衣冠玉帛萬方同柳芽轉暖晴光動花蕊迎暘淑氣融自是昇平開泰運相期吾道永興隆讀書臺閑抱瑤琴訪百花上人還與論三車能分香積厨中飯慣煮孤山雨後茶洗墨池荒秋草合讀書臺古夕陽斜壁間正好題詩句留取他年䕶絳紗杏林清隠傳家三世總能醫不獨長桑授上池董奉林香丹杏熟蘇耽井在緑苔滋城中賣藥人同識谷口行春鶴慣隨我亦欲傳丹鼎訣洞天石扇擬同窺小姑山姑石嵳峨不可攀粧臺更在白雲間丹梯下壓龍蛇窟鐵鎻髙懸虎豹闗使客未鳴蒼玉珮江妃先嚲緑雲鬟江南莫道無形勢笋立天門第一班送人之官雨霽清流玉滿川錦衣簇簇立沙邊旋沽南石橋頭酒聊送東風江上船行色一枝春在柳去程千里水連天待看考績歸來日細聴鶯聲奏管絃送花狀元詔許歸娶三月都門鶯亂啼郎君春色上朝衣潘生况擬供調膳張敞仍須學畫眉南陌酒香銀甕熟西湖月朗畫船歸極知身負君恩重莫遣心隨粉黛移牡丹為黄公器詠不將紅紫競芳菲似與天公别有期金縷織成雲外錦珊瑚長出海中枝一欄國色君須記滿䄂天香我所思陪賞喜同諸俊彦醉歌渾似洛陽時淦江書屋為李宅賦故人家住大江邊又踏鷗波已七年養鶴亭深栽竹地讀書窻裊煮茶烟論交有道慚垂顧推轂無能與薦賢莫道相從忘夙昔梅花氷雪嵗寒天乙丑三月訪子白兄於秦淮橋五月南風水倒流秦淮橋下問扁舟穿花燕子羽毛濕隔水人家門巷幽心憶庭闈瞻楚樹身陪冠冕侍瀛洲吾兄歸去如相問衣綵終期慰白頭王子逸見寄韻簡百寅昆季荆揚文物冠南邦詩作長城擬受降漢氏菑畬今有㡬陸家兄弟舊無雙窻聴夜雨消銀燭簾捲秋山倒玉缸為謝歸來陶縣令㡬時揮棹到滄江謁余忠宣公祠將軍忠節冠荆揚千載精神日月光血戰孤城身已殞名垂青簡汗尤香殘碑墮淚空秋草折㦸沉沙自夕陽我亦有懐追國士為君感慨奠椒漿送人之京松華金粉落春衣有客過門索贈詩司馬豈無乘駟日終軍又是入闗時新豐樹色雲中露長樂鐘聲雨外知好去風流三語客恩波咫尺鳯凰池泛湖霧捲黄沙浪蹴天衣冠同載泛湖船香爐倒影凌銀闕瀑布無聲落紫烟秪可吟詩招五老那堪接武厠羣賢袖中亦有凌雲賦願借長風到日邊近郭産瑞蓮二枝同鄒孟彰楊徳顯何仕璉賦羅襪香塵太液池凌波化作玉蓮枝始知秦虢承恩日不似皇英望狩時翠袖相攜誇窈窕銀屏雙倚鬭腰肢明年獻頌甘泉裏朱草嘉禾未足期賦得孟義科斗送監生楊仲文歸台州親迎孤石巉岩出紫烟雲根遺墨尚依然文章豈在龜疇下形質還存鳥跡前汲塚秋風思汗簡魯堂春雨悶韋編郎君歸去和鳴後織作機中錦字傳送周望徃四川駟馬橋邊秋水波郎君此去意如何衡陽鴈陣驚寒早巫峽猿啼入夜多一水東來通漢沔衆山西上接岷峨少陵祠宇清溪曲為瀉椒漿試一過贈醫士習以質藥爐丹火映晴霞見説桐林是習家衣拂松雲窺石髓瓢分崖瀑飯胡麻豈無董奉林中杏亦有安期海上􅆶待我蟾宫通桂籍從君金液錬金花送人之京天子龍飛辟俊才金灘江上錦㠶開龍泉劍自豐城出明月珠從合浦來王氣曉浮鳷􅍎觀文章宵應鳯凰臺錦袍公子仙舟侣金榜東風取次催贈侯伯俊侯家妙墨異人方蚤嵗曽供白玉堂樸􅈪霜花收兎葉淋漓天藻動龍香文章敢謂抽金匱圭璧仍煩出錦囊留取松楳千斛在蘭亭髙興屬流觴灞陵樵牧為謝伯大賦新築茆堂面翠微灞陵風景更依稀拾薪路險莓苔滑放犢林深笋蕨肥卜式肯將金換爵買臣安用錦為衣他年斤斧相尋處牛角懸書候夕暉郡庠胡子温以楊侯所題弓求賦遂為書此七寳雕弓􅍎血紅使君髙誼孰能同鼎湖猶憶軒轅墮蛟浦徒誇漢武雄空谷扣弦驚夜月上林飛箭待秋鴻桑弧自有平生志未數麒麟第一功次孟子温贈之什銀箭銅壺促曙暉論文未覺故人稀連床風雨三年别百里星河兩地違人物數推黄叔度文章誰似謝𤣥暉髙岡莫道無鳴鳯舊種梧桐已十圍解嘲秋來晚興浩如雲閒拂霜華看劍紋莫恠風流謝安石未應憔悴沈休文驊騮神駿寧論肉鵰鶚身輕更出羣千載征南不穿扎至今猶作晉元勲愛日堂巚山之陽親所居游子愛日將何如寸心耿耿過葵藿暮景皎皎垂桑榆階前綵服弄鸚鵡堂上金盤行鯉魚丈夫忠孝須努力期君日夕思居諸送周子澄之厯城難兄佐邑扶風裁令弟辭家篤友于風雨㡬年疎共被闗河千里轉征車天垂鉅野河流急秋盡江南木葉疎他日到官煩訊問琴堂詩思夜何如次答本素上舎滿城車馬自相求髙卧衡門四壁秋翡翠蘭苕差後識蒹葭玉樹媿同遊葛洪峯下山連屋陶侃臺西月滿樓不有故人能見問此中髙處有誰儔橘林精舍為醫陳植徳賦千株仙橘倚雲蒼聞説陳家有草堂宻葉連村滋霧雨疎枝垂實礙衣裳井頭洗藥紅泉煖花裏懸壺白晝長我與蘇躭曾有約願分丹實駐顔光杏林書屋為姜思彦賦萬巻堆中樂有餘年來種杏繞階除開花每見蜂環屋結實嘗聞虎守株窻下簡編勤肄習籠中藥物富收儲朝廷政在需材急安用藏名好學居寄同窻諸公十載相逢在泮林㡬回握手共論心䕫龍禮樂經綸久班馬文章慷慨深五色蓬萊青鎻闥一樽風雨白頭吟丈夫不灑臨歧淚安遣芳名照古今寄曽得之諱魯舘陶人任禮部侍郎高鳥知還久倦飛分甘萬里逺王畿虎頭食肉侯何用雞舌含香事已違愽望尋源經月去長卿為蜀暫時歸寄言玉笥雲中客終擬相從採蕨薇送總戎出征天子龍飛定朔南知君此去定呼韓班超自信輕投筆馬援仍能老據鞍飲馬窟春泉脉煖射鵰風急雪花寒同行王粲吾知己應有音書早寄看挽黄徳淵瀟湘西下水雲鄉每憶相隨醉夕陽黄壤頓埋醫國手青囊猶貯養生方紫芝歌絶猿啼怨丹杏林空虎跡荒掛劍獨來松柏下炙雞絮酒㡬沾裳洪武庚午元日試筆扶桑日轉曉曈曈千樹梅花雪未融酌酒吟春瞻北極升堂賀嵗遇東風天垂華蓋青雲近地接仙源玉圃通二頃石田今廢盡獨持書劍望年豐柬金秀才㓜孜令譽常從早嵗聞麟經學問獨超羣篝燈寒聴清宵雨覔句晴看白晝雲未向月宫攀古桂先從泮水採香芹交遊幸遂論心樂尊酒常同坐夕曛送淦城百花寺僧竹峯請度牒南歸鳯閣岧嶤紫禁長五雲垂影絢天光緇衣素識龍鸞氣墨板新承雨露香杯渡海門秋𣺌𣺌錫飛淮甸月茫茫賜還有待南歸日來訪支公卧石床早朝和友徐子權韻曈曈旭日上東山金鎻齊開虎豹闗霧藹爐烟當鳯扆風傳臚唱肅鵷班呈來八駿花前簇朝散千官柳外還回望蓬萊猶咫尺薫絃奏徹五雲間和韻答傅彦武放逐南還孺子鄉扣舷誰與泛滄浪有懐採藥尋方士無復聯班侍紫皇夜雨桐花當户落春風蘭茝隔簾香讀書未了平生志深愧雲林卧石床五言絶句漁樵問答明月蘆花被秋雲槲葉衣相逢兩相契談笑坐忘歸罷直圖草詔下金鑾宫槐白露寒紫騮驕不控明月在闌干為百華寺竹峰上人題梅四首粲粲珠璣服娟娟玉雪姿東風庾嶺路春色在南枝又老樹餘生意疎花發故枝平生心鐵石正在嵗寒時又仙子六銖衣翩翩月下歸洞簫吹紫玉春色醉如泥又勁節傲風霜出花粲瓊玉春滿九霞觴羅浮新酒熟七言絶句山水小景玉笥諸峰翠接天鶴汀鳬渚近相連老翁日暮不歸去釣得槎頭縮項鯿達泉圖一夜春雷動石泉桃花新漲已連天幽人悟得朝宗理興在滔滔百折前題墨梅姑射仙人玉珮環瓊簫和月上青鸞素衣不受緇塵染留與江南嵗晏看郭子成入闗詩卷岳翁乘棹章江日曽約先人泊畫船若問周南留滯事不才金匱守遺編先人交契若雲烟最説君家外舅賢我有愁心似征鴈隨君千里到秦天柬式菴索紙通籍金閨愧不才扁舟又自望蓬萊聞君素楮光於雪願借文章動上台秋日作水精簾動桂花風湘簟凉生八月中魄落西窻銀燭裏烏絲雪蠒寄秋鴻中秋日答曽仲和桂花凉露㵼涓涓秋滿銀盤月正圓不是庾公無此興祇因病酒妬婵娟訪李彦澄不遇戯題過門不入非我心贈言敢擬瑤華音澄江八月淨如練𤣥暉有約來相尋射卷新開射圃鳯岡前手挽雕弓滿月圓記得楊侯飛羽日泮池楊柳葉皆穿重午日答友人青鳥新傳錦字詩髙情非是故相違歌鐘滿坐風流客不稱山人鶴氅衣寄友人胡子温重午日作海榴花裏簟紋疎五月清凉八月如遥憶故人家慶處綵衣壽酒獻菖蒲題匏菴所藏畫鶴羽翛翛弄月明篔簹谷裏暮寒生憑誰截作叅差玉吹出伶倫嶰谷聲百尺長松石上栽紫雲深䕶碧崔嵬緑簔坐釣盤陀石細雨斜風不肯回題梅四首月逄三五光纔滿梅遇陽回始着花禪定湛然忘色相不知疎影上袈裟老禪心跡本來空却與寒梅臭味同昨夜苦吟清不寐雪花開遍月明中嵗寒百卉凋殘盡自信孤芳映雪清相對老僧禪坐處一輪明月正三更曽向孤山占早春肯同桃李媚時人暗香疎影黄昏月應共禪心不涴塵續集詩文附寄問小木醫士陳植徳玉笥之峯三十六夫子茆廬處江麓明朝騎虎來相問白髮壺公酒應熟識廖永年所藏靈隠寺碑册葉公諱申任太常寺少卿右靈隠寺碑一卷金華石塘胡先生撰吳興趙文敏公書夫藝者士之末耳然非其中有絶人者則其緒餘亦不足以超出乎一時而取重於後世吳興公風流篤厚庶㡬西周麟趾之風非特末世之佳公子而已而石塘在元清脩苦節最為諸君子所推服余嘗聞諸其邑人有富人欲誌其父墓者素聞先生名漕粟三百石以請先生以其人品非雅馴笑謝曰吾弗能諛墓中朽骨以取貲也士論亦以是多之則其所立固有過人者况其文章簡而不刻無季世苦窳之氣而吳興用筆之玅直與李北海相上下蘇靈芝張從申之流不論也則文墨之藝又曷可少耶顧世之無得於内而徒區區以盡力於外者不足以語此也廖生永年葆愛此巻不啻拱璧求余識之故為書此贈吳嘉静公號拙庵西庄人任吏部員外郎簷花細雨廣文氊不到江城又十年投筆謬曽先俊傑横經深喜得才賢乾坤一氣鳶魚外風月無邊杖屨前逺大相期須努力宣尼三絶在韋編送大將出征皇明館課九重飛詔紫泥新帝命南征遣大臣宫路迴傳銀瓮煖江花初報錦袍春蠻烟瘴雨驅車逺朔雪燕雲送捷頻汗馬功成催入覲汾陽勛業照麒麟題徽宗草蟲皇明舘課蟲豸薨飛異卉芳宣和㸃染自君王當時不省觀無逸對畫令人感慨長大一統詩皇明館課聖皇御極天眷隆四海一統車書同鴻圖寳厯協昌運玉京金闕觀成功析津自昔稱天府千里邦畿蒞中土疊巘盤回海嶽崇重闕列峙森貔虎宸居奕奕當天中王氣五色皆成龍星辰北極共環繞萬方入貢梯航通庶民歡呼工效職天心昭格人歡懌瑞光揚彩絢瞳朧寳花呈祥分的厯滿目光輝錦綺張慶雲煥發摛天章咸傳聖徳致斯應頌歌載道聲洋洋頌聲洋洋中外溢聖徳如天重謙抑屢宣明詔敕羣臣共答嘉禎期盡力小臣日侍金堦前華封三祝瞻堯天永祈聖壽齊天地聖子神孫萬萬年贊邑司訓黄南谷像先生長湖人洪武間徴為本邑司訓中丞公曽出門下親筆載遺像􅇿之名儒邑之司訓大道逺探木鐸宏振所存者恕用罔弗臧所積者善後宜益昌中丞集巻下中丞遺事附録忠祠議謹按故左副都御史練公子寧名安以字行係臨江府新淦縣人今分峽江縣則公峽江善政鄉二都人也公父伯尚洪武間為起居注直言忤㫖出為廣徳州同知調臨汀鎮安二府通判卒於官其烈節家風有自來矣公少與金㓜孜友善嘗謂㓜孜曰子異日為良臣我必為忠臣洪武甲子舉于鄉明年對大廷極言近日朝廷用人狥名而不求實小善驟進小過輙戮因厯陳古昔教養任用之道言甚剴切上親擢第二授翰林修撰未㡬内艱杜門屏迹力行喪禮服闋復除翰林陞副都御史工部侍郎建文初改吏部與蹇義為左右侍郎以賢否進退為己任多所建白又改御史大夫辛巳改都察院為御史府子寧改御史中丞靖難兵起子寧與卓敬等畫策防禦極論李景隆隂懐異志屢敗召還子寧執景隆于朝數其罪請誅之不聴子寧憤激叩頭大呼曰此賣國賊臣備員執法不能為國除奸請先伏誅遂罷朝靖難兵既渡江靖江府長史蕭用道衡府紀善周是修上書論大計指斥當事者誤國書下廷臣及兩人議用事者怒詬二人子寧曰禍難日迫我輩謀國之臣實尸其咎事已至此尚不能容人言乎詬者愧而止文皇即位縳子寧至語不遜斷其舌曰吾欲效周公輔成王子寧手探舌血大書地曰成王安在遂族其家姻戚逮死者百五十一人戍邊者又數百人惟吉水錢氏得免及錢習禮仕於朝為鄉人所持以告少保楊榮榮乘間以聞文皇欣然曰使子寧尚在固當用之况習禮乎昭皇踐祚詔稱方孝孺綀子寧等俱是忠臣宸章褒愍心迹愈明竊念練公力挽綱常志扶天地以身殉國何慙荀息之言見義忘家遂赤要離之族精誠貫于金石大節振于古今固宜隨在表揚者也况追踪故土實光靈降陟之鄉而肇建新邦又風化激揚之日大饗崇祀誠為要典該縣城西有廢廟一所近議拆毁合改為祠宇以祀練公俾寃䰟有託餒鬼來歸不惟可以慰泉下之忠抑足以作後來之氣云爾又有自靖祠詩云中原龍戰起萬國撼雷風天意别有主人心獨在公青山無斷骨白日見孤忠到此看臣節羞言靖難功出海鹽錢琦臨江集史傳練子寧名安以字行父伯尚洪武初任起居注以直言忤㫖出為廣徳同知調汀州鎮安二府通判卒于官子寧性英邁不凢㓜從鄉長者竹荘先生游竹荘命賦水竹村居歌有千山暮雨石泉通一夜春雷籜龍長之句竹荘大竒之後游邑庠與金㓜孜相善常謂之曰子後必為良臣我當為忠臣洪武甲子領鄉試明年對大廷極言朝廷今日用人狥其名而不求其實以小善而遽進之以小過而遽僇之因厯陳古人所以教養之道言甚剴切不顧忌諱太祖嘉之擢第二名進士及第授翰林脩撰子寧益以名節自砥礪由是聲望蔚然中外咸以文學行誼稱之滿三載丁母憂杜門屏跡力行古喪禮服闋仍除脩撰建文帝立用廷薦拜吏部左侍郎子寧進賢退不肖多所建白辛巳罷都察院典刑獄改為御史府如唐宋御史臺故事職專糾察子寧初任左副都御史中丞靖難師起曹國公李景隆奉命出師至北方宻通欵藩府賣國喪師謀祕未露子寧一日于朝班内執景隆陛前數之曰景隆以功臣子兼至戚為上公奉命出師朝廷何負于汝汝迺敢謀叛姦邪不忠請速行誅建文不聴子寧叩頭大呼曰賣陛下者必此賊也臣備員執法不能摧姦請先伏誅是日遂罷朝北師渡淮廷中倉皇失措靖江王府長史蕭用道衡王府紀善周是脩上書論大計指斥用事者之誤國書下廷臣及兩人議用事者見之大怒盛氣以詰兩人子寧從旁沮之曰國事至此吾與公輩當均任其咎尚怒言者乎顧所論吾過有則改之無則加勉耳詬者愧而止太宗即位詔治姦黨李景隆于上前必欲殺之子寧不屈遂族誅姻戚被逮論死者百五十一人戍逺方者又數百人吉水錢習禮以子寧姻戚未及逮既官中朝恒為鄉人所持心懐疑懼以告學士胡廣楊榮乘間為上言之上忻然曰使子寧今日尚在朕固當用之况習禮乎即日下令禁止子寧與侍講方孝孺同朝孝孺嘗稱其多學而甚文後同知王佐輯其遺文一帙序而名之曰金川玉屑即練公文集提學副使李夢陽始命有司梓之出革朝遺忠録與金聲玉振集表忠録備遺集國記同練子寧初名安以字行自㓜志趣不凢與金㓜孜相友善常曰子異日必為良臣吾其為忠臣乎洪武乙丑舉進士第二人拜翰林脩撰久之陞吏部侍郎革除間多所建明與方孝孺同見親信改御史大夫靖難兵起日夕畫䇿防禦李景隆敗還極論其姦邪於朝班中執請誅之時靖江府直史蕭用道衡府紀善周是脩上書指斥用事者誤國之罪齊黄怒詬之子寧曰國事至此尚不容人言乎詬者愧而止北兵渡江景隆開門迎附子寧不屈遂伏誅外史氏曰子寧請誅李景隆此制勝之長䇿也而時不能用此其所以亡歟他日太宗嘗謂侍臣曰使練子寧尚在朕固當用之聖君惜才之心可想矣出羣忠事畧文皇即位指揮劉傑縛練子寧至語不遜斷其舌曰吾欲效周公輔成王子寧手探舌血大書地曰成王安在族其家出遜國臣記遺忠録同練安字子寧以字行父伯尚洪武間為起居注以直言忤㫖謫廣徳州同知後遷臨汀鎮安二府通判卒于官安性質英邁志操不凢㓜從鄉長者竹荘先生游竹荘命賦水竹村居歌有千山暮雨石泉通一夜春雷籜龍長之句竹荘甚竒之後游邑庠與金㓜孜相友善常謂之曰子後必為良臣我必為忠臣洪武甲子領鄉薦明年入對大廷極言今日朝廷用人狥其名而不求其實以小善而遽進之以小過而遽僇之因厯陳古人所以教養任用之道言甚剴切不顧忌諱髙廟嘉之擢第二名進士及第入翰林為脩撰安益以名節自砥礪於是聲望蔚然中外咸以文學行義稱之未㡬以母喪去位杜門屏跡力行古喪禮服闋陞吏部左侍郎時革除君初嗣位安進賢退不肖多所建白與方孝孺等特見信用㝷遷左副都御史庚辰罷都察院典刑獄改為御史府如唐宋御史臺故事專糾察靖難師起安極論曹國公李景隆奸邪不忠喪師賣國一日朝班内執景隆數其罪過奏請誅之上不聴安憤激稽首曰敗陛下大事者此賊也臣備員執法不能除奸請先伏誅上素柔弱為之不樂遂罷朝師既渡淮靖江府直史蕭用道衡府紀善周是脩上書論大計指斥用事者罪過書下羣臣及兩人議用事者怒盛氣以詬兩人安謂之曰國事至此吾與公等罪不可逭乃尚不容言者乎顧所論吾過有則改之無則加勉耳詬者愧而止壬午六月有詔治奸黨安不屈遂族誅之姻戚被逮論死者百五十一人戍逺方者又數百人惟吉水錢氏得免及錢習禮仕于朝為鄉人所持恒懐不安以告少保楊榮乘間以聞文廟忻然曰使練子寧今日尚在朕固當用之况習禮乎即日下令禁止後同知王佐輯安遺文一帙序之曰金川玉屑集即練公文集提學副使李夢陽命有司梓之出小史洪武乙丑殿試前一日髙皇帝夢三絲墮地至鴻臚寺唱名丁顯第一練子寧次之黄子澄又次之及放榜丁巳物故乃以練為第一黄次之二甲第一花綸又次之簪花遊宴姓名旁各有絲實符夙夢上甚喜之故當時有丁練黄花練丁之謡出野史建文五月甲辰遣刑部侍郎金闕禮部侍郎黄觀徃安慶翰林脩撰王叔英徃廣徳都御史練子寧徃杭州分道徴兵入援各奮不顧身出憲章録靖難初齊黄方練上觸天怒俱罹赤族之誅於是建文遺臣有行遯者題詩娥眉亭云一箇忠成九族殃全身逺害亦天常夷齊死後君臣薄力為君王固首陽出敖英雜言中丞遺事附録
