body:
  text: 練中丞集别集類五明提要臣等謹案練中丞集二巻明練子寜撰子寜名安以字行號松月居士新淦人洪武乙丑進士建文時官左副都御史燕兵入殉節死事迹具明史本傳當燕王簒立之初誣建文諸臣為姦黨禁其文字甚嚴宏治中王佐始輯其遺文名曰金川玉屑故徐泰詩説有金川練子寜玉屑無多為世所寳之語此本乃泰和郭子章重編附以遺事一巻其裔孫綺復增輯之黄溥簡籍遺聞嘗記集中可疑者三事一曰送花狀元歸娶詩謂洪武辛亥至建文庚辰狀元但有呉伯宗丁顯任亨泰許觀張信陳䢿胡靖七人無所謂狀元花綸綸乃洪武十七年浙江鄉試第二不應有奉詔歸娶事一曰故耆老理庭黄公墓誌謂子寜及第在洪武十八年此誌後題洪武丙辰三月之吉乃洪武九年不應結銜稱賜進士及第授翰林院修撰一曰集後雜考引葉盛水東曰記載長樂鄭氏有手巻練子寜賦張顯宗跋稱顯宗狀元及第洪武時亦無此狀元其言頗核葢子寜一代偉人人争依託因而影撰者有之然終不以偽廢其真也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總官臣陸費墀
  hash: sha256:1c0c27930433eef3e4fdc9856036c6d2b28cbd9d613803364d1f21424f43a05a
