body:
  text: 中丞集卷上明練子寧撰䇿制䇿一道洪武十八年殿試䇿皇帝制曰朕稽古名世者惟敬事而畏人神趨事以歴知涉難以立志日運不息歲運無已雖在寢食未嘗忘其所以由是大輔人君福臻黎庶所以名世者爲此也朕自代元統一寰宇官遵古制律放舊章孜孜求賢數用弗當其有能者委以腹心面從而志異純德君子授以祿位但能敷古於事束手中材下士亷恥無知身命弗顧造罪淵泉永不克已張君之惡若非真賢至聖亦莫不被其所惑若此無已柰何爲治爾諸文士雖在進學之秋未專乎庶典但能條陳可否則知利鈍既承朕命悉乃心力志根名世在斯舉始必如朕意臣對伏見陛下發徳音下明詔以得人之難下詢草茅之陋其謀之不可謂不廣其求之不可謂不切矣臣不知陛下果能有以聽之歟抑將少布衣踈賤之臣不足以與天下之大計姑有以試之歟雖然君以名求臣以實應之陛下舉是名以問也臣敢不舉實以爲對也若夫好言以招禍觸諱以忘身則非臣之所敢恤也伏讀聖策曰朕稽古名世者惟敬事而畏人神趨事以歴知涉難以立志日運不息歳運不已雖在寢食未嘗忘其所以由是大輔人君福臻黎庶所以名世者爲此也嗟夫敬事而畏人神一語此乃唐虞三代聖人命官之大本也陛下能以是求諸古昔命世之臣則必以是而擇夫今日命世之臣矣彼區區管商之謀申韓之習烏足爲陛下道哉陛下既有意於唐虞三代之臣臣不敢復引漢唐之臣以爲對請以唐虞三代之臣終焉昔者舜之命九官十二牧也曰欽哉惟時亮天工武王之稱有夏之臣曰惟御事厥棐有恭伊尹之戒大甲曰鬼神無常享享于克誠周公之戒成王曰小人怨女詈女惟皇自敬德夫能以是而告夫君則能以是而任諸己可見矣曰欽曰恭曰克誠曰敬徳又豈有出於陛下所謂敬畏之外者哉趨事以歴知涉難以立志日運不息歳運不已雖在寢食未嘗忘者亦孰非敬畏之發見也是故語其大輔人君則上而唐虞有放勲重華之極治語其福臻黎庶則下而三代有刑措不用之丕績臯陶伊傅周召之爲臣率是道也伏讀聖䇿曰朕自代元統一華夷官遵古制律放舊章孜孜求賢數用弗當臣以爲陛下以天錫之資居表正之位即位以來十有八載孜孜求賢以爲生民計日夜念此至熟也至於數用弗當雖臣亦疑之然而未敢遽爲陛下道也夫人君之道在於知人人臣之職在於任事君有知人之明則臣有任事之實矣昔者臯陶之陳謨曰在知人文王之任宅俊曰克知三有宅心灼見三有俊心大抵人各有心不可測度知人之難從古病之然古之聖人未嘗患其難而不以是爲先務也故唐虞之用人必敷奏以言而後明試以功必明試以功而後車服以庸未嘗輕易而授之也文王之於三宅也既得其人以居常伯常任凖人之任矣又儲其才以備常伯常任凖人之選焉未嘗造次而任之也今陛下孜孜求賢而數用弗當者無他焉亦察之不詳而用之太驟之過也伏覩陛下自頃歳以來誅戮姦囘作新政治於是紛然擢用天下之士以共成厥功或以聰明正直爲名或以孝悌力田爲選或以賢良方正爲科陛下責望之意非不深也委任之意非不甚專也然而報國之效茫如摶風豈是數者之果不足以爲治哉亦狥其名而不求其實之故也是故古之用人者日夜思之必其人之足以當是任也然後以是任畀之而不疑今也不然以小善而遽進之以小過而遽戮之陛下求賢之急雖孜孜而賢才不足以副陛下之望者殆此也且夫天下之才生之爲難成之爲尤難陛下既知生之成之之難矣又豈忍以區區之小故而即付於刀鋸斧鉞之地哉昔漢武帝以英武之資而所用之人或朝奏暮召少不如意則誅戮隨之故汲黯有言曰以有限之才縱無窮之誅武帝曰不然天下之才無窮特患人君不能用之臣以爲武帝非不能用之患在不能知之耳茍誠知之也大以成其大小以成其小量其才而任之以官因其能而授之以職果姦邪也則誅之戮之果庸劣也則黜之退之又何忍於殺戮而後曰吾能用天下之才也哉使武帝之計爲是是堯舜三代之道爲不足法矣伏讀聖䇿曰其有能者委以腹心多面從而志異純徳君子授以祿位但能敷古於事束手中才下士亷恥無知身命弗顧造罪淵泉永不克己張君之惡若非真賢至聖亦莫不被其所惑若此無已柰何爲治臣聞徳勝才謂之君子才勝徳謂之小人才徳俱全謂之聖人才德俱亡謂之愚人才德俱全固世之所罕矣臣竊觀自秦漢以來竊人主之柄以成天下之禍者舉皆才勝德之小人也又豈特面從而志異哉若夫純德君子但能敷古於事束手者無他亦歴涉之不詳練習之不敷故耳故三代之教八歳入小學而教之以禮樂射御書數之文而後世有皓首不能周知其名數者十五入大學而教之修已治人之道而後世有沒齒而不躬行其萬一者此古之君子皆卓然有爲而今之君子所以不及也臣伏覩陛下升御以來興天下之學校育天下之賢才亦云至矣然如教之之術尚有未盡故士之成就者亦尚有所未至也臣願陛下求胡瑗之法立經義治事齋經義齋者各治一經治事齋者各治一事如治民治兵水利算數之類内自京邑外逹府州縣各妙選其術之尤者以爲學校之師而歳考其成績則成徳之君子不患其束手無措矣至於下士之徒無恥之軰則臣所謂才德俱亡之謂也是故宜在擯棄之列矣陛下能詳於其始則可畧於其終能勞於其先則可逸於其後知人之道茍無其缺則施之職任各得其當又焉有柰何爲治之嘆哉陛下之所以策臣者大畧如此而於其末復命之曰爾諸文士雖在進學之秋未專乎庶典但能條陳可否則知利鈍此陛下憐臣之愚而欲盡臣之説也又曰既承朕命悉乃心力志根名世在斯舉始必如朕意此陛下導臣之進而欲臣以古人自期也臣之所謂可否者前既已陳之矣至於利鈍則非臣所敢計也陛下之欲臣以名世自期者臣則請服膺於敬事而畏人神之一語矣至於阿曲以求恩逢迎以徼寵不以責難陳善之道進乎陛下曰必如陛下之意焉則非臣之所學也臣等荷陛下生成之恩受陛下教育之徳倘不以蒭蕘之賤而棄臣則所謂欲得夫名世之臣者在陛下教之之有其方知之之盡其道爾愚陋之言無足采者惟陛下憫其拳拳之忠而有以教之不勝幸甚臣謹對序送廖兼善入大學序經所以載道故士之欲明夫聖賢之道者必急於治經經既治則天下之理有不足明而天下之事有不足識者矣後之治經則不然言理者或不足於事為施政者或不本於道徳而甚者附㑹穿鑿取先儒之糟粕而笙簧之以求合有司之尺度幸有得焉則出而號於人曰我知聖賢之道如是而已矣正心誠意之實漠然不與其身心也嗚呼經之設豈端使然與抑淳厚之俗替而浮薄之習勝與無乃弊陋之相承而魁偉有志之士偶未之思與何其習俗之難易也余嘗怪而疑之邑人廖兼善治經而有志於道者也於其别書以問之石田書隱詩序淦城之南六十里有地曰石邱其上衆山聳然而角立其下清泉決然而交流其中佳木鬱然而並植問其居則曰錢氏也問其世則曰故吳越之苗裔也問其俗則晝耕耘而夕絃歌也余嘗過而樂焉肩輿造門見錢氏之胄曰伯起目其貌專精而秀發聽其言疏通而練習余因疑其將慨然出而為世之用也後六年余自京師歸復過其廬則伯起方蓄書築室以為林隱之計出其卷所謂石田書隱者求余序之且曰吾將老於山林待子一言以傳諸不朽余怪而問焉伯起曰太上不言命其次居易以俟命其下妄行而不知命夫富貴貧賤夀夭命也隨所寓而安之者君子所以俟天命也是故坐于廟堂上佐天子而下率百官者命也一邱一壑盡力乎畊釣而究意於方冊者亦命也之二者皆命也失乎彼必得乎此而世之人常汲汲於彼而戚戚於此余竊惑焉故吾隨所遇而必安焉若曰慕富貴而羞貧賤豈余之志哉又曰人之所立者禮義也所營者衣食也石田之入雖薄而可以供伏臘也詩書之教雖迂而可以淑后昆也吾之所得天命者既不足以兼善天下矣豈不足以獨善其身乎嗟夫余今而後知伯起之為不可及也始余之識伯起也以其才能之美足以勝一官之任而已矣不知其他也今觀其於富貴貧賤之際如此豈不超然有賢於人矣乎然則若伯起者其幾於俟命君子矣遂書是語以為之序工乎詩者宜樂道之送光祿署令李孟輝服滿入京序士之遭治世則彈冠奮纓歌呼踴躍思有以効其能無賢不肖皆欲紛然以自致於闕下而伸其辭説茍一言之合躍然自喜世常以此竒之而其人亦以此自多於世余竊以爲不然士君子之得君也非言之難所以自立者難茍吾節之未礪誠之未至雖言聽計從君子弗忍得於其君也而况於徒屑屑於言語之末而未足以將順匡救於萬一者乎子路問事君子曰勿欺也而犯之夫以孔子聖人其於事君也亦反求諸己而已未嘗敢有所僥倖於其君也而世之爲士者則不然豈其所學者不出於孔氏者與余友光祿署令李孟輝質而文信而通敦厚而溫恭與人交自盡有不求乎人余固知其出而事君也必有以異乎人而幾於古之不欺者也今年母喪既除將如京師徵言於予以爲别予以爲孟輝之才無待於余之誦說矣若夫事君之道則余與孟輝孔氏之徒者所當熟講也遂書以爲孟輝贈孟輝其亦思有以處我哉贈醫士劉孟圭序洪武十八年秋余歸自京師其明年二月兒子觀得疾幾殆下痢而上逆弗乳食者累日問諸醫醫以爲不治余亦將弗以人齒也方有事於禱求友人黄惟初氏曰有孟圭於此以醫鳴者數世矣盍請視之彼急人之危宜來來則病之存亡可知也因其說而致之數日而病良愈余既得孟圭之功思有以爲報孟圭笑曰所貴君子弗可以貨取也余雖業是其庸以貨取乎余愧乎其言遺之言曰醫之爲術聖人所以濟人之夭死也而世之以是名者逐逐然惟利是求而於其死生之際漠然若越人視秦人之肥瘠夫豈聖人好生之意哉孟圭以專門之業而能后利而先義其賢於世俗逺矣雖然世之論醫者以爲始於軒岐而著於史籍者扁鵲倉公其最也孟圭茍能推是心進進而不止則古人可馴至矣余雖不才職在太史庶幾有聞而大書特書以繼乎扁鵲倉公之後則余亦何敢多讓焉孟圭其勉之是爲序送凃儀曹歸龍溪序代人作君子蒞民也非使其畏之之爲難使其去而思之者難也任天子一郡縣之寄操賞罰之權以御乎下雖欲無畏可得邪故善於為政者不恃其有可畏之資而恃其有可愛之實使其忠孝豈弟之意黙運於綱紀法度之間而斯民隂被其德此豈新進之徒急於功利者所可同日而語哉余友凃公某佐政于淦三年淦之民無老弱皆服其賢而感其惠秩滿入朝天子嘉其能擢為禮部員外郎余時方受命繼公來蒞于淦公既與余爲鄰邑人而喜其為政之相先後也於是其風俗民物之詳盡以告焉且拂之而生怨雖齊魯亦然而舉措得宜茲邑之民尤易化也明年四月公以太夫人憂去職取道於淦以之汀余與之㑹于金川之上公方退然在衰絰之中而邑民之咨嗟嘆息思其徳而願見者惟恐後也嗚呼此豈非忠厚豈弟之所致使之既去而能思者歟其異於斯民之貌畏而心不服者逺矣余既辱公之知而且同吏于茲樂其民之慕公之徳而不忘也於是乎言李彦澄詩序洪武八年余與彦澄李君始相識於開封賈惟中之座悚然異之以為非當世之流也惟中曰子豈盡知之乎其議論英發雖博聞强記之士有不如其文詞精緻雖操觚㺯翰之士有不逮余慨然嘆曰僕求友於四方乆矣今始克見之於是相與往還益得聞所未聞者後㡬年惟中辭秩歸余與彦澄相見益習每意有所適未嘗不坐語移日也又九年余以進士官于京師未㡬以家難歸今年復將有京師之行彦澄手其文示余曰辱知於子有年矣其可無一言乎余以為文者士之末事未足以盡知君也古之人得其志行其道則無所事乎文文者多憤世無聊而將以傳諸其後者也今彦澄年且富才當敏茍出而從事於政事之府吾知其猶蒲梢駃騠於九軌之塗附韓哀而御造父也奚事區區之文字乎雖然古之公卿大夫於化成俗美無以發其至治之盛則往往作為聲詩奏之朝廷薦之郊廟頌聖神之丕績揚禮樂之𢎞休使聖君賢臣功徳炳然照耀于千載之上則文章者固可以少歟又何必區區窮愁之餘而侈文字之工也彦澄之徳之材素有聞於鄉閭居父喪三年禮無違者是能治其本矣則文詞之美豈偶然而致哉余與彦澄相知十年固異於庸俗之相與者矣然則文字之責又安得不交致其濯磨鏃羽之道也哉他日有知彦澄者出而薦之於朝則稱頌聖君賢臣之功徳而鳴至治之盛者彦澄不得辭其責矣余雖不敏尚當與彦澄馳驅周旋於翰墨之場以信十年之相知者爲不謬也送白稅入京序代人作臨江當東南水陸之衝而淦又居上㳺凡閩廣之貨登于舟車者必道是乃得他適故闗市之稅常重他縣茍司稅者不得其人則商賈之經是邑者指目牽引潛伏逺去期不鬻於是而後止則用之入於上者未見其贏而民之役於是者已告病於下矣故必得亷介端慎之士疎通練達之材權其輕重制其盈縮然後商賈之貨溢於市㕓而民之役於是者可計日而待更焉然則征𣙜之職雖卑而非得其人不可也洪武十年平陽白氏初來莅是職于淦敏而亷介而通商賈之出於是者皆頌其賢而緡錢之入民無過病者焉於戲其余所謂得其人者矣今年秋以秩滿將如京師士大夫惜其去者咸爲作詩歌以贈之余於君有先後之好衆以爲宜爲此序者也故不能辭黄體方詩序李太白神仙之流也觀其自謂昔於江陵見天台司馬子微謂其有仙風道骨可與神遊八極之表賀知章一見即稱為謫仙人非其襟度之髙而能致此聲於名勝之士乎方髙力士用事時士之趨附者何可勝數而太白視之不啻奴𨽻其英偉豪傑之氣自足以葢天下士也故其文章豪放飄逸風騷之後卓然鮮麗夫豈區區於塵埃糠粃者所能冀其萬一哉自唐及宋罕有繼者元初惟清江范徳機清修之節超卓之見發而爲文以鳴其一代之盛亦往往有能蹈其軌轍者葢非特其祖述之工由其本諸中者有以異於人也予自幼嗜太白詩嘗恨未逹其襟度則固可勉强而學洪武十八年余自京師歸友人黄體方氏出其詩若干篇示余葢汲汲於李太白之門牆而求陟乎賔阼之階者余於是撫卷而嘆喜吾邑之士有能同余之志也後二年余將有京師之行體方曰詩不可無序也子其爲余識之余以爲體方之詩固規規於太白矣若其襟度之高氣節之壯則尤學太白者所當知也雖然太白逺矣學者有能修其文行而無愧於徳機斯亦魯人之善於學栁下惠者記畫記蘇文忠公論畫以爲人禽宫室器用皆有常形至於山石竹木水波烟雲雖無常形而有常理常形之失人皆知之常理之不當雖曉畫者有不知余取以爲觀畫之說焉畫之爲藝世之專門名家者多能曲盡其形似而至其意態情性之所聚天機之所寓悠然不可探索者非雅人勝士超然有見乎塵俗之表者莫之能至孟子曰大匠誨人以規矩不能使人巧莊周之論斵輪曰臣不能喻之於臣之子臣之子亦不能受之於臣皆是類也方其得之心而應之手也心與手不能自知况可得而言乎言且不可聞而况得而效之乎效古人之蹟者是拘拘於塵垢糠粃而未覩其真者也雖然亦難矣余友清江陳敬止自幼嗜畫鳥獸魚蟲之情性雲烟山水之變態莫不精究為人傳形寫影尤能隂得其神之天故薦紳大夫士多稱許之洪武某年春訪余於山東為余寫真大得其似敬止狀若不勝衣於勢利進趨淡如也顧常有志於學問文章而尤寓意於畫此其所見異於世俗逺矣故余以蘇文忠公論畫者告之且以助其天機之所到云舒嘯軒記道新淦而南水行八十里曰峽江大江中流兩山對峙如壁舟上下縈折崖石間幽隂慘淡之氣動人毛髮南行又十里豁然平曠山高而水深舒望廬陵諸峯如圖畫濵江而上有陂池林園之勝則友人毛仲鼎兄弟之所居也洪武二十年余嘗過焉仲鼎弟仲槐延余於東軒軒外萬竹挺立蒼翠可愛仲槐舉觴見屬而請名於余余率爾曰以翠筠名之既而思之不足以盡其勝後三年仲鼎之子省震來請記更名之曰舒嘯而告之曰此淵明之所以超然於世俗之表也夫逐逐而趨昧昧而歸紛紜思慮毫分縷析銖稱寸量而無頃刻之息者貪夫權士之常也豈暇於性情之適而曠逹之寄邪君子則不然至濁也不爲之汚至繁也不為之亂至狹也不為之局居卑處隘之隙必有登臨之觀治煩剸劇之餘必有㳺息之地夫然後可以脫煩囂而逺垢氛獨覽萬化之原而深究三才之理知以之而益明學以之而益進行以之而益充天下豈有難為之事哉此君子之所以超然而異於衆人也余聞仲鼎兄弟篤於友誼在堂之親年埀七十左右無違養於取友誼以誠處已愿以恭是必聞君子之道矣以其㳺息之間而廣其才識之富其誰能禦之余於仲鼎兄弟既有交㳺之雅俟他日歸榮故鄉扁舟往造道崖石之﨑嶇歴山水之平曠然後詣仲鼎兄弟於舒嘯之軒發言曠達之懷以一解其幽隂慘淡之氣然後援筆以繼歸來之篇想淵明之風於千載之上余雖不敏尚當為仲鼎道之古愚齋記君子之志於古也非故爲是驚世絶俗之舉也合乎古必違乎今不違乎今斯不能有合乎古也譬之衢路然之越者必南其轅適燕者必北其轍然後可以冀其進而至焉燕之轍而越之轅蔑有濟矣余嘗以是而隂求同邑之士得一人曰謝君直夫直夫爲人退然若不勝衣人視之眇然儒者也使其當衆論狐疑之際是非蠭起之餘直夫一笑而揮之使邪正之辯黒白之分昭然若薰蕕氷炭之不可相掩而人自退服强禦之士以非義而加之者則折之於理必逹其志而後可志既逹爾而退無矜容嘗慕史鰌汲黯之爲人曰吾惡夫脂韋汨沒搖尾乞憐以終其身者於是取孔子之言扁其齋曰古愚而徵余文以爲之記余以爲古之聖賢可名者多矣而謝君獨思得古之愚者而與之爲徒豈非深疾夫是之諛佞譸張之流而過為是謙抑之托乎雖然士患不志乎古茍志乎古則自愚而智自智而賢自賢而聖夫誰能制之合乎古者益多則違乎今者亦逺矣然則直夫之名是齋也其越轅燕轍發軔之初也歟審其塗而範其驅雖欲不至於古人之域不可得也湄湘書屋記陳生某從余㳺年甚少而有志於學居三年以余將有京師之行手其所謂湄湘書屋圖一卷以請曰某幸得承訓於先生愚弗克竟其業今先生將去是而升于天朝願丐一言以為之賜是先生朝夕臨教之也其請至五六而益勤於是退而披其圖則溪山之映帶有遺俗之思竹樹之隂鬱有隱居之趣即其室而聞絃誦之聲觀其人而有揖讓之敬於是撫卷而嘆曰畫者之意其幾於知理者歟然則雖生之欲請於余余之所以教生者無過於是者矣生誠能遺俗而去其紛競之私隱居而致其亷退之節味聖賢之道而不替其絃誦之勤恭父兄之教而無忘其揖讓之風則雖古人之教生者尚無過於是而况於余乎雖然余之告生以是而不眩其名夫名者實之賔也有其實斯可以有其名矣不然其不幾於世之好名之徒服堯之服而行桀之行者哉生之父某於余爲叔父練而後於陳者也余於生有兄弟之親而重之以師友之誼其請之勤也故不得辭杏林書隱記淦姜君彦思結屋數楹於東山麓故居之北内蓄圖書外植大杏帶以清流環以羣山扁之曰杏林書隱以㳺息其間且志先世之舊也暇日彦思邀余過之與之周覽歎息徘徊四顧而竊有感焉方元之盛時吳楚庶富甲天下淦號得其百二視富之居如官府如王公之第宅者不可勝數誇竒競侈窮丹雘而被文繡者甍相銜地相接也當是時豈知有杏林書隱之異耶一旦勢窮運屈而向之炎炎赫赫者雲散水沒數年之間欲求其敗瓦遺垣無復存者而彦思獨能守其先人之基益事修葺以繼其先志葢杏林書隠之異至於是而始見也姜之先人世以儒顯有譯史諱某者尤嗜書積書之富侔於祕閣曰書隠者其别號也彦思雖業於醫而留意於儒術經史百氏悉窺其蘊以世之﨑嶇齟齬而不合遂以醫藥而閟其聲光由是觀之姜氏之澤尚未既也余與彦思為同邑人而又獲聯于婣友欲彦思之世其徳而益裕其後也遂書所感以記之若夫種杏以慕神仙之風藏書以爲子孫之記則余他日得請而歸幅巾杖屨以與彦思遊尚當鼔缶鳴之以繼諸賢大雅之後也東皋小隠記誇富麗者必居於闤闠之交慕沖素者必處乎林野之僻之二者罕得兼焉雖其人之所尚有不同亦理勢之使然也新淦黄君伯淵業醫者累世矣至伯淵而行益修家益裕藥之自山澤來者必歸于伯淵氏伯淵每厚其殖而亷取於人由是衆推以爲長者家居于市高門望族之第宅蟻聚而星羅富商大賈之貨殖雲臻而霧集掉鞅於勢利之途者朝往而夕待焉伯淵曰是非遺外世俗者所恒處乃擇地於邑城之東東山之麓升其髙以望則委蛇而合者若環然縈紆而流者若帶然舒徐而平者若席然於是芟其蕪伐其枯凌其汚則淦之東南諸峯皆躍然效竒獻秀於几席之下乃構堂以爲别業之所無陟降跋涉之勞而坐得夫幽䆳之觀焉於是扁其居曰東皐小隠命工繪圖而徵余文以為之記余觀夫人之處夫市井者惟知美其飲食華其衣服侈其宫室而已其於山林魚鳥之樂固未嘗一窺其藩籬也今伯淵處富麗而懷冲素之思居闤闠而耽林野之賞是其所謂兼得者耶然則伯淵之賢其過於世之人逺矣夫樂道人之善者君子之事也余雖不敏伯淵之賢其可不樂道之也是為記石友軒記世之取友者或以徳或以藝或以節操孟子曰友也者友其徳也孔子曰友直友諒此以徳而友者也曰友多聞此以藝而友者也此君子之所以取乎大者也至於木石之爲物無輔相之徳無相資之藝然自昔賢人君子隱德之士多取以自匹豈非其節操之足尚乎夫雪霜風雨寒暑之爲變也亦大矣自凡物而論之孰不以是而休戚而石之爲物介然曽不以是爲意觸風雨而傲雪霜暑至大旱而不焦寒至折膠而不變莭操之凌厲有過於此者乎世之能榮辱人者其勢燄熏灼亦未烈於數者也而士鮮不喪其故失其守者其所立之節固有愧也由是觀之石之賢於人也逺矣其可取友也審矣新安方宗儀好學而患於易其操者也以石友名軒而請余記之余故書此以風世之爲士者也守黙齋記友人錢仲黙儒者也名其齋曰守黙而請記於余余竊疑焉夫君子之於言語也貴乎當而已矣不專主於黙也茍得其當雖百不爲病一不當焉已病矣然則黙之義豈可守耶仲黙曰不然吾之惡夫言者非爲是也孔子曰惡利口之覆邦家者徒能言者未必有徳又曰君子欲訥於言而敏於行夫言豈聖人之所棄哉自三代之衰處士横議而聖賢之道不明陵夷至於戰國㳺說之士更以口舌相傾卒以是亡而秦遂至而失天下由是觀之言之不本於道徳其害葢如此豈非利口覆邦家之驗歟故曰予欲無言又曰天何言哉夫孔門弟子有長於文學者矣有善於說辭者矣若顔淵者終日黙黙如愚人而已參也以魯見稱於聖人而已然自當時羣弟子皆推尊之而更千萬世而不可及者豈特區區之言語乎余之以是名齋也葢思有以希夫聖賢而亦將以警夫世之喋喋之徒昧於道徳之歸而惟世利之趨者矣不然予豈緘黙隱忍同流俗而合汙世將無所是非可否於胸中而卒如子所疑也耶余既善其言遂書以爲之記墓銘表太夫人墓誌太夫人姓郭氏諱㢲貞世爲新淦之招賢里人曾祖某父幼髙皆不仕母張氏同邑張徳輝之女太夫人年二十有七始以父母命歸于我先府君恭順以事上慈惠以蓄下宗戚内外咸以為表式我先府君之學行碩茂克繼前哲以光耀于後者寔有助焉子男二人長子寧先府君側室之子次曰德輿太夫人所出也女曰明明善善麓麓皆早卒姪二人曰居貞溫舒太夫人既相我先府君躬歴患難而晚有𦙍嗣故於子姪之恩尤篤歲時祭祀常撫其二姪與其子子寧徳輿曰練氏宗祀之重惟此而已先府君之亡子寧始年十二太夫人以教以誨俾至於成人常曰以忠厚存心以修正自立此汝父之志也汝其勉之洪武十八年六月己未太夫人以疾卒享年六十一先府君之官于朝以言事出為廣德同知未幾再遷臨汀鎮安二府通判弗及考績而沒故太夫人之寵贈禮弗克成二十年正月庚申始葬于新淦東山之原太夫人疾革時子寧以㑹試留京師天子嘉其直言擢在第二授翰林院修撰八月壬辰始克理喪診視禱祠棺斂之類姪溫舒殫力為之嗚呼子寧之不孝生不能盡菽水之歡沒不克躬其斂視之事疾病不視藥食不嘗蒼天蒼天痛其可極敢以不孝之辭粗述先徳納諸𤣥堂倘鬼神有知而罪一遺孤獲庇賴之賜克全大節不辱其親俟當掲我先府君太夫人之德而表諸墓阡以盡不孝之志云張處士墓誌銘淦之陽有隱君子張公徳輝倜儻有氣節不隨俗頫仰以干名譽以布衣終於家邑人至今稱之有子三人長曰重平器宇凝重有識度重平一子曰處士君伯庸子寧先太夫人郭氏之内弟也子寧幼時先太夫人嘗教之博學且曰汝父自幼以力學聞時人無能知者獨吾外祖張公一見以為國器我之所以歸於汝家繄吾外祖張公之意也小子其識之子寧雖未獲拜公而知公為人元季之亂先君子避難四方事定而歸先太夫人兄弟罕有存者獨處士君巋然無恙勞問如平生子寧及弟徳輿嘗侍教焉後二年先君子沒於鎮安子寧以非才獲齒進士承詔歸鄉閭太夫人以疾卒又五年而君亦卒嗚呼子寧之不肖既不逮遂其養於父母而至於親戚亦不復相與以久處焉此渭陽之痛所以過於古人也處士君諱秉中字伯庸幼而機警及長而藉祖父之遺業而能持之以節儉處之以謙謹故鄉邑稱其賢而能保其家者必以君為首君尤善滑稽未嘗不傾倒其坐人或有犯君君亦澹然無較洪武二十三年閏四月十八日君以疾卒享年六十有三越五日甲申卜葬邑東之乾溪配鄒氏元將仕郎和仲甫之女側室孫氏俱有賢行子三人長曰成之次曰繼之幼曰與之皆好學工書二十六年癸酉十一月一日卜葬於欽風鄉豐坑之原成之以書走京師謂子寧曰願兄有以銘之子寧既得聞太夫人之訓而知君大父之潛德又及以諸甥禮事君故哭而銘之曰淦有隠士知之者稀倜儻瑰竒老於布衣吾先君子抱道未試公一見之待以國器其後有聞卒不愧公不有君子孰開羣蒙潛徳弗施施于孫子華髮蒼顔老于桑梓惟我處士節儉以勤談笑滑稽屈其坐人老成云亡風俗日異史不闕文尼父所喟處士有子視余猶兄千里寓書囑余以銘豐坑之原大車之里我作銘詩式昭厥美故耆老理庭黄公墓誌銘洪武乙丑余以丁艱南還友人黄體方述其祖耆老理庭翁行實徵文銘其墓按狀公諱中字通理理庭其别號也其先世居豫章之竹山宋淳祐間髙祖愚齋先生以明經薦辟淦庠司訓遂留寓於淦城曽祖儀軒祖均祥父慶叔世以詩書鳴俱韜徳弗輝母周氏贛州路大使云甫女也生公於前元皇慶癸丑三月十三日辰時公幼失怙恃從母舅奉御宗南周公㳺同寓於金臺官舍舅嘉其賢以兄萬安主簿宗王女妻之至正壬午生長子于通州既還别卜居於城北慈訓坊公生而穎異尚氣節好春秋學博文强識所居之堂扁曰明理西園辟書舎延明師以訓子孫其室之旁築樓曰江上清風以娛賓親當時縉紳士咸爲賦詠之迨國朝龍興之初郡邑推公齒徳優碩充四坊耆老排難解紛人所嘆服此公之賢於人可尚矣子二人長徳誠即通州所生妻城東張氏春谷先生五世孫宗賢女也次彦誠娶固村宋氏廣東提刑球之十二世孫務才女也女五人俱適淦城仕族孫男七人曰榘即體方學問皆博娶真定張氏曰珪妙齡秀發習業庠邑曰璋曰泉曰瑛曰瑢曰琉皆瑰偉俊傑公以洪武丙辰七月十五日以疾終于正寢得年六十四是嵗十一月二十五日葬欽風鄉歸仁里白竹橋之原作壬山丙向爲墳當時未有銘誌嗚呼公之學余得聆其言公之德予獲觀其行烏可無銘哉兹因其請遂不辭而為之銘曰簪纓之胄江鄉之英源于竹山流于淦城書鄉世澤繼繼繩繩我銘貞石其徳永馨朱處士孺人張氏墓誌銘嗚呼士之克自樹立而免於愧怍者豈獨其人之賢哉葢必有父母姻戚教誨規戒之力焉孔子曰魯無君子者斯焉取斯唐崔𤣥暐母盧氏有賢行𤣥暐遵奉教戒以清謹見稱而母之言曰吾見姨兄屯田郎中辛𤣥馭曰兒子從官者貧乏不能存此為可喜若貲貨充足衣馬輕肥此爲可憂吾嘗以為確論比見親表中仕宦者將錢物上其父母父母但知喜悅竟不問所從來必其俸祿餘貲誠一善事如其非禮所得此與盜賊何别縱無大咎獨不内愧於心嗚呼賢哉母也使世之教子者舉如母士之免於汙辱者其衆矣新淦朱昌從余㳺十三年清苦刻厲為諸生最洪武二十五年邑以秀才薦于京除虎賁左衛倉使未幾以誣去職益閉戸讀書彈琴賦詩澹然無世俗好建文三年冬手其文一通謁余於京師拜而請曰昌之外姑孺人諱某姓張氏清江人外舅處士朱公敬徳之配也曽祖某祖某父某累世皆弗仕孺人生有淑徳年十七歸于我外舅處士公事舅姑能得其心友娣姒能盡其道平居嬉笑未嘗聞於里鄰而疾言遽色雖奴僕不妄加也至正壬辰天下大亂豪傑蝟起鄉邑諸豪日以吞併攻剽為事孺人謂處士曰君家素豐于貲而君好臧否人物今之世殆難免乎盍散其積以賙饑寒冺其智以下强暴幸及昇平所全大矣處士用其言竟獲免於難皇明受命天下厎寧處士客遊四方者累年家事絲毫以上孺人悉經理之尤刻意訓子儒先聞人禮之惟恐不及洪武之初處士之産不踰中人末年田園之入皆倍蓰於昔諸子偉然知所好尚而不為非義者孺人之功為多洪武二十七年夏五月某日以疾卒享年六十子三人曰琛篤慎有守曰琳倜儻豁畧曰琉謙和謹直後孺人六年卒孫男六人曰丰曰時曰安曰潤曰某曰新女二人長曰某適新淦陳孟良次曰婉即歸于昌者也初昌之舉秀才也孺人戒之曰汝以好學獲譽於賢士大夫今將受知於明天子而授汝以職也汝其勉之夫士節莫貴於亷女德莫貴於貞士而不亷猶女之不貞雖有他善莫贖矣汝其勉之昌佩服不敢忘後待罪委吏俸入不足以具薪芻孺人遣其諸子歳有饋遺未嘗乏絶且益申前戒昌之所以克全其守而無愧於心豈惟父母師友之訓導是賴繄孺人之教也安既歎其賢有崔氏之風而復有感夫孔子之言也遂為之序次其說而系之以銘曰婦主中饋無與於外輔翼之良夫子是賴子既有成施及諸甥孰嫓其賢崔母是徵張彦良墓誌銘新淦張彦良既亡之踰月其仲子瑾執狀而請於余曰某不天將以是月某日葬子幸賜之銘使之有辭以勒諸幽室以紓不孝之罪也余固辭不獲乃按其狀而銘之公諱忠字彦良其先為廬陵人祖秀峰始家于臨江之新淦父諱文漠元末授崇安縣主簿遭亂未食其祿而沒母楊氏公兄弟三人某某皆先卒公生長富厚而能恬於勢利不事進取中更喪亂克自樹立性雅嗜酒喜賔客遇其所好則酬酢淋漓必盡醉而後止雖山陽竹林之曠達自謂無以過也初娶某氏再娶某氏皆謹飭有婦道子男二人長瑨次瑾女一人孫某某方公病亟時瑨以事留京口凡診視禱祠之事瑾悉以身任之公歎曰自壬辰之變以迄于今鄉閭之不得其死者衆矣今既復覩太平之時獲保首領以見先人於地下矣夫何恨哉命之脩短非藥石所能損益也語畢而卒不及他事寔洪武十九年四月辛丑也享年五十葬於某處之原以孺人孫氏祔焉公之長子瑨於余有髫年之好清才敏識余甚敬之今公之沒也余既悲瑨之羇於行役不得致其哀痛之思又嘉瑾之能盡夫送終之孝而無愧於其父若兄也乃為之銘銘曰張之先世實廬陵人家于淦陽以子以孫自其先君卓有令聞偉兹彦良先軌克遵有子既賢而養弗逮仲也皇皇伯也行邁刻覆貞石以發悲慨内殿崇班薛君墓表公諱塾字宗道姓薛氏翰林學士兵部尚書肅公之弟薛之世徳終始有肅公之誌與碑公官至内殿崇班某年月日卒官於蜀其子仲儒扶其喪歸葬於絳之正平先壟而來乞銘以誌余幸嘗紀次肅公之徳而又得銘公其銘曰公躬直清官次材稱惟賢而似不愧其兄既葬而仲儒又來請曰銘之藏誠以永吾先君子之不朽然不若碣於隧以表見於世之昭昭也余惟薛於絳為著姓肅公於公爲兄弟而公之世徳余既銘之而其子又欲碣以昭顯於世可謂孝矣然余考古所謂賢人君子功臣烈士之所銘是於後世者其言簡而著及後世衰言者自疑於不信始繁其文而猶患於不章又備其行事惟恐不為世之信也昔薛氏之著於絳前肅公之信天下而余之銘不愧其兄則公之銘不待䌓言而信也然公行事終始余亦不敢畧而誌諸墓矣今之碣無以加焉則取其可以簡而著者書之以慰其子之孝思而信于絳之人云中丞集卷上
